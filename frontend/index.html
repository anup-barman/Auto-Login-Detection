<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automated Attendance Dashboard</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0b1121; /* Deep slate */
            color: #f1f5f9;
            font-family: 'Inter', sans-serif;
            background-image: radial-gradient(circle at top right, #1e293b 0%, transparent 40%),
                              radial-gradient(circle at bottom left, #0f172a 0%, transparent 40%);
        }
        .glass-panel {
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            border-radius: 1rem;
        }
        tr:hover td {
            background: rgba(51, 65, 85, 0.3);
            transition: all 0.2s ease;
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 flex flex-col items-center">
    
    <div class="w-full max-w-7xl">
        <!-- Header -->
        <header class="flex justify-between items-center mb-8 glass-panel p-6">
            <div>
                <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-indigo-500">
                    Automated Attendance System
                </h1>
                <p class="text-slate-400 text-sm mt-1">Linux Lab Final Project Dashboard</p>
            </div>
            <div class="text-right flex items-center justify-end gap-3">
                <a href="http://localhost:5000/api/export" class="px-4 py-1.5 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded transition border border-slate-700 text-sm font-medium flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    Export CSV
                </a>
                <span class="px-3 py-1 bg-indigo-500/20 text-indigo-300 rounded-full text-sm font-semibold border border-indigo-500/30">
                    Live System Status
                </span>
            </div>
        </header>

        <!-- Stats Grid -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="glass-panel p-6">
                <h3 class="text-slate-400 text-sm font-semibold uppercase tracking-wider">Total Active Users</h3>
                <p id="stat-users" class="text-4xl font-bold mt-2 text-white">--</p>
            </div>
            <div class="glass-panel p-6">
                <h3 class="text-slate-400 text-sm font-semibold uppercase tracking-wider">Total Lab Hours</h3>
                <p id="stat-hours" class="text-4xl font-bold mt-2 text-blue-400">--</p>
            </div>
            <div class="glass-panel p-6">
                <h3 class="text-slate-400 text-sm font-semibold uppercase tracking-wider">Recorded Sessions</h3>
                <p id="stat-sessions" class="text-4xl font-bold mt-2 text-indigo-400">--</p>
            </div>
        </div>

        <!-- Main Content Grid -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Left col: Chart & Alerts -->
            <div class="lg:col-span-2 space-y-8">
                <!-- Chart -->
                <div class="glass-panel p-6">
                    <h2 class="text-xl font-bold mb-4">Attendance Overview</h2>
                    <div class="relative h-72 w-full">
                        <canvas id="attendanceChart"></canvas>
                    </div>
                </div>

                <!-- Latest System Alerts -->
                <div class="glass-panel p-6">
                    <h2 class="text-xl font-bold mb-4 text-red-400 flex items-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                        System Alerts
                    </h2>
                    <ul id="alerts-list" class="space-y-3">
                        <li class="p-3 bg-slate-800/50 rounded flex justify-between">
                            <span class="text-slate-400 italic">No recent alerts...</span>
                        </li>
                    </ul>
                </div>
            </div>

            <!-- Right col: Leaderboard -->
            <div class="glass-panel p-6 h-full">
                <h2 class="text-xl font-bold mb-4">Student Leaderboard</h2>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="text-slate-400 text-sm border-b border-white/10">
                                <th class="pb-3 font-medium">Rank</th>
                                <th class="pb-3 font-medium">User</th>
                                <th class="pb-3 text-right font-medium">Hours</th>
                            </tr>
                        </thead>
                        <tbody id="user-table" class="text-sm">
                            <tr><td colspan="3" class="py-4 text-center text-slate-500">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = "http://localhost:5000/api";
        let chartInstance = null;

        async function loadDashboard() {
            try {
                // 1. Fetch Stats
                const statsRes = await fetch(`${API_BASE}/stats`);
                const stats = await statsRes.json();
                if(stats.error) throw new Error(stats.error);
                
                document.getElementById('stat-users').innerText = stats.total_users;
                document.getElementById('stat-hours').innerText = stats.total_hours;
                document.getElementById('stat-sessions').innerText = stats.total_sessions;

                // 2. Fetch Users
                const usersRes = await fetch(`${API_BASE}/users`);
                const users = await usersRes.json();
                
                const tbody = document.getElementById('user-table');
                tbody.innerHTML = '';
                
                const labels = [];
                const data = [];

                users.forEach((user, idx) => {
                    labels.push(user.username);
                    data.push(user.total_hours);

                    const tr = document.createElement('tr');
                    tr.className = "border-b border-white/5 last:border-0";
                    tr.innerHTML = `
                        <td class="py-4 px-2 text-slate-400">#${idx + 1}</td>
                        <td class="py-4 px-2 font-medium text-white">${user.username}</td>
                        <td class="py-4 px-2 text-right text-indigo-300 font-mono">${user.total_hours.toFixed(2)}h</td>
                    `;
                    tbody.appendChild(tr);
                });

                // Render Chart
                const ctx = document.getElementById('attendanceChart').getContext('2d');
                if(chartInstance) chartInstance.destroy();
                
                chartInstance = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'Total Hours Logged',
                            data: data,
                            backgroundColor: 'rgba(99, 102, 241, 0.7)',
                            borderColor: 'rgba(99, 102, 241, 1)',
                            borderWidth: 1,
                            borderRadius: 4
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { display: false }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                grid: { color: 'rgba(255,255,255,0.05)' },
                                ticks: { color: '#94a3b8' }
                            },
                            x: {
                                grid: { display: false },
                                ticks: { color: '#94a3b8' }
                            }
                        }
                    }
                });

                // 3. Fetch Alerts
                const alertsRes = await fetch(`${API_BASE}/alerts`);
                const alerts = await alertsRes.json();
                
                const alertsList = document.getElementById('alerts-list');
                if (alerts.length > 0) {
                    alertsList.innerHTML = '';
                    alerts.forEach(alert => {
                        const li = document.createElement('li');
                        li.className = "p-3 bg-red-500/10 border border-red-500/20 rounded flex items-start gap-3";
                        li.innerHTML = `
                            <div class="mt-1 w-2 h-2 rounded-full bg-red-500 shadow-[0_0_8px_rgba(239,68,68,0.8)] shrink-0"></div>
                            <div>
                                <p class="text-white text-sm font-medium">${alert.message}</p>
                                <span class="text-xs text-slate-400">${alert.created_at}</span>
                            </div>
                        `;
                        alertsList.appendChild(li);
                    });
                }

            } catch (err) {
                console.error("Failed to load dashboard data.", err);
            }
        }

        // Init and refresh every 30 seconds
        loadDashboard();
        setInterval(loadDashboard, 30000);
    </script>
</body>
</html>
